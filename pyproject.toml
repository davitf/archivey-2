[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "archivey"
version = "0.2.0.dev0"
description = "Python library for reading zip, tar, rar, 7z and other archives through one uniform interface"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Davi Figueiredo", email = "gh@davitf.com" }]
keywords = ["archive", "zip", "tar", "rar", "7z", "iso", "extract"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Topic :: System :: Archiving",
]
dependencies = []

[project.urls]
homepage = "https://github.com/davitf/archivey"
repository = "https://github.com/davitf/archivey.git"

[project.scripts]
archivey = "archivey.__main__:main"

[project.optional-dependencies]
# Interim Phase-1 extras: 7z/RAR reading still goes through py7zr/rarfile
# (ported from DEV). The native-first extras layout from packaging-and-extras
# is realized in Phase 8.
"7z" = ["py7zr>=1.0.0"]
rar = ["rarfile>=4.2"]
iso = ["pycdlib>=1.14.0"]
zstd = ["zstandard>=0.25.0"]
lz4 = ["lz4>=4.4.5"]
cli = ["tqdm>=4.67.1"]
all = [
    "py7zr>=1.0.0",
    "rarfile>=4.2",
    "pycdlib>=1.14.0",
    "zstandard>=0.25.0",
    "lz4>=4.4.5",
    "tqdm>=4.67.1",
]

[dependency-groups]
# PEP 735 dev group: test/lint/type-check tooling plus the libraries needed to
# generate test archives and act as test oracles. Never installed for end users.
dev = [
    "pytest>=8.3.5",
    "pytest-cov>=5.0.0",
    "pytest-timeout>=2.3.1",
    "mypy>=1.10.0",
    "ruff>=0.11.11",
    "coverage>=7.5.0",
    # Optional runtime libs, exercised by the ported DEV test suite.
    "py7zr>=1.0.0",
    "rarfile>=4.2",
    "pycdlib>=1.14.0",
    "zstandard>=0.25.0",
    "pyzstd>=0.17.0",
    "lz4>=4.4.5",
    "tqdm>=4.67.1",
    "cryptography>=45.0.3",
    "brotli>=1.1.0",
    "typing-extensions>=4.0.0",
]

[tool.uv]
package = true

[tool.mypy]
python_version = "3.11"
strict = true
files = ["src"]

[[tool.mypy.overrides]]
module = [
    "brotli",
    "indexed_bzip2",
    "lz4",
    "lz4.frame",
    "rapidgzip",
    "rarfile",
    "tqdm",
    "uncompresspy",
    "xz",
    "py7zr",
    "pycdlib",
    "zstandard",
    "pyzstd",
]
ignore_missing_imports = true

[tool.ruff]
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
extend-select = [
    "I",   # import sorting
    "F",   # pyflakes
    "C4",  # comprehensions
    "ISC", # implicit string concatenation
    "ICN", # import conventions
    "RET", # return practices
    "TID", # tidy imports
    "TC",  # type-checking imports
    "BLE", # blind except
]

[tool.pytest.ini_options]
pythonpath = ["src", "."]
testpaths = ["tests"]
addopts = "--log-level=DEBUG"
timeout = 60
timeout_method = "thread"
log_format = "%(asctime)s %(levelname)s %(threadName)s %(name)s:%(filename)s:%(lineno)d %(message)s"
log_date_format = "%Y-%m-%d %H:%M:%S"
markers = [
    "sample_archives: declarative parametrization over sample archives and config variants",
]

[tool.coverage.run]
source = ["archivey"]
branch = true

[tool.coverage.report]
exclude_also = [
    "if TYPE_CHECKING:",
    "except ImportError",
    "raise NotImplementedError",
]
