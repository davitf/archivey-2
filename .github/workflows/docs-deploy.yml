name: Deploy docs

# Publishes the MkDocs site to GitHub Pages on every push to the default branch.
# PR-time validation lives in ci.yml ("Docs build", `mkdocs build --strict`); this
# workflow is deploy-only. Uses GitHub's Actions-based Pages deployment, so no
# `gh-pages` branch is needed — but the repo must have Pages "Source" set to
# "GitHub Actions" once (Settings → Pages).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-progress publish finish rather than cancelling it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Build docs (strict)
        run: uv run --group docs mkdocs build --strict
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
