name: CI

# Run on PRs (covers every branch that has one) and on pushes to main (post-merge
# and direct pushes). Scoping push to main — rather than "**" — avoids running the
# whole matrix twice for branches with an open PR, where both `push` and
# `pull_request` would otherwise fire on each commit. No coverage is lost: PR
# branches are validated by `pull_request`, main by `push`.
on:
  push:
    branches: [main]
  pull_request:

# Cancel an in-progress run when a newer commit arrives for the same PR/branch, so
# rapid pushes don't pile up redundant full-matrix runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Lint + type-check once (these are environment-independent). No continue-on-error:
  # a failure here fails CI — the "clean on Pyrefly AND ty" gate is enforced.
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync (dev tooling + all extras)
        # Type checkers need optional deps importable (tqdm, pycdlib, …) so they can
        # validate real types rather than suppress missing-import. `--extra all` matches
        # the everyday recommended install; core-only is covered by the test matrix.
        run: uv sync --group dev --extra all
      - name: Ruff lint
        run: uv run ruff check src/ tests/ scripts/ benchmarks/
      - name: Ruff format
        run: uv run ruff format --check src/ tests/ scripts/ benchmarks/
      - name: Pyrefly
        run: uv run pyrefly check
      - name: ty
        run: uv run ty check

  # Build the API-reference site with mkdocstrings. `--strict` turns broken refs and
  # rendering warnings into failures, so doc rot (a renamed/removed public symbol, a bad
  # cross-reference) fails CI like any other check.
  docs:
    name: Docs build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.12
      - name: Build docs (strict)
        # --python overrides repo `.python-version` (3.11) so docs actually run on 3.12.
        run: uv run --python 3.12 --group docs mkdocs build --strict

  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }} / ${{ matrix.install }}
    runs-on: ${{ matrix.os }}
    # Backstop for a hang outside a test (install/sync). A hung *test* fails much sooner via
    # pytest's per-test --timeout; this just bounds the whole job so it can't run for hours.
    timeout-minutes: 20
    # Force every uv sync/run in this job onto the matrix interpreter. Without this,
    # `.python-version` (3.11) wins and "py3.12/3.13/3.14" legs silently re-test 3.11.
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: full [all] on every supported Python; clean zero-dep core on min+max
          # only (the core path barely varies across point releases — min/max is enough).
          - { os: ubuntu-latest, python-version: "3.11", install: core-only }
          - { os: ubuntu-latest, python-version: "3.14", install: core-only }
          - { os: ubuntu-latest, python-version: "3.11", install: all }
          - { os: ubuntu-latest, python-version: "3.12", install: all }
          - { os: ubuntu-latest, python-version: "3.13", install: all }
          - { os: ubuntu-latest, python-version: "3.14", install: all }
          # Minimum supported library versions (uv --resolution lowest-direct) on the min
          # Python: the [all] legs above run the *current* versions of every dependency, so
          # this leg pins each declared dep to its floor (pycdlib 1.16, zstandard 0.23, …) to
          # catch version-specific bugs that the default highest-version resolution hides.
          - { os: ubuntu-latest, python-version: "3.11", install: all-lowest }
          # macOS + Windows on min/max Python (cross-platform path/symlink/junction surface).
          - { os: macos-latest, python-version: "3.11", install: all }
          - { os: macos-latest, python-version: "3.14", install: all }
          - { os: windows-latest, python-version: "3.11", install: all }
          - { os: windows-latest, python-version: "3.14", install: all }

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # ---- core-only: install the package with NO extras and NO dev group, then prove
      # the zero-dep core works and that no third-party runtime package is present.
      - name: Install core only (no extras, no dev group)
        if: matrix.install == 'core-only'
        run: uv sync --python ${{ matrix.python-version }} --no-dev

      - name: Assert zero-dependency core
        if: matrix.install == 'core-only'
        run: uv run --python ${{ matrix.python-version }} --no-sync python tests/check_zero_dep_core.py

      # Run the full suite against the zero-dep core too. pytest (+pytest-cov) is
      # layered in ephemerally with --with so the optional FORMAT libraries stay
      # absent; tests that need an optional lib must skip/xfail cleanly (see the
      # `requires` helper in tests/conftest.py), which is exactly what this leg proves.
      - name: Run tests (core-only)
        if: matrix.install == 'core-only'
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          --with pytest --with pytest-cov --with pytest-timeout
          pytest tests/ -q

      # ---- [all]: full extras + dev group; run the whole suite.
      - name: Install all extras + dev group
        if: matrix.install == 'all'
        run: uv sync --python ${{ matrix.python-version }} --group dev --extra all

      # ---- [all-lowest]: same extras, but every declared dependency pinned to its minimum
      # allowed version (--resolution lowest-direct), so the suite runs against the floor of
      # the supported range. Resolves fresh rather than from uv.lock (which pins current
      # versions); the shared test step below uses --no-sync so this resolution stands.
      - name: Install all extras + dev group (minimum versions)
        if: matrix.install == 'all-lowest'
        run: >
          uv sync --python ${{ matrix.python-version }}
          --group dev --extra all --resolution lowest-direct

      - name: Install unrar (Linux only, for RAR data tests)
        if: (matrix.install == 'all' || matrix.install == 'all-lowest') && runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y unrar || true

      - name: Assert synced venv Python matches matrix
        # Catch regressions where `.python-version` silently overrides the matrix again.
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync python -c
          "import sys; exp=tuple(map(int, '${{ matrix.python-version }}'.split('.')));
          got=sys.version_info[:2]; assert got==exp, (got, exp); print(sys.version)"

      # Process isolation for intermittent Linux [all] heap corruption (rapidgzip /
      # pyppmd natives). Separate steps — not a multiline script with shell
      # continuations — keep this Windows/PowerShell-safe. Full write-up + soak/A/B:
      # docs/internal/known-issues.md ("Intermittent Linux full-suite heap corruption").
      # --no-sync so the all-lowest leg keeps its minimum-version resolution.
      - name: Run tests
        if: matrix.install == 'all' || matrix.install == 'all-lowest'
        env:
          PYTHONFAULTHANDLER: "1"
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          pytest tests/
          --ignore=tests/test_property_safety.py
          --ignore=tests/test_rapidgzip_deflate_zlib.py
          --ignore=tests/test_accelerator_shutdown.py
          --ignore=tests/test_accelerator_corruption.py
          --ignore=tests/test_ppmd_raw_streams.py
          -q

      - name: Run accelerator stream tests
        if: matrix.install == 'all' || matrix.install == 'all-lowest'
        env:
          PYTHONFAULTHANDLER: "1"
        # One fresh subprocess per accelerator module (coverage off, breadcrumbs).
        # PPMd raw streams are intentionally not in this batch — see next step.
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          python scripts/ci_run_native_modules.py

      - name: Run PPMd raw stream tests
        if: matrix.install == 'all' || matrix.install == 'all-lowest'
        env:
          PYTHONFAULTHANDLER: "1"
        # Still runs the assertions in required CI, but soft-passes the known
        # intermittent exit-after-green pyppmd abort (sessionfinish exit=0 then
        # SIGSEGV/SIGABRT). Hard-fails on real pytest failures. Soak / root-cause
        # lives in the non-required PPMd native stress workflow.
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          python scripts/ci_run_native_modules.py
          --modules tests/test_ppmd_raw_streams.py
          --allow-exit-after-green

      - name: Run property-safety tests
        if: matrix.install == 'all' || matrix.install == 'all-lowest'
        env:
          PYTHONFAULTHANDLER: "1"
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          pytest tests/test_property_safety.py -q

  # Free-threaded correctness for the declared MemberStreams.CONCURRENT seam (core backends).
  # Optional extras are not claimed covered here — skips do not count as free-threaded support.
  free-threaded-concurrency:
    name: free-threaded-concurrency / py3.13t / concurrent_reader
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install free-threaded CPython 3.13t
        run: uv python install 3.13t
      - name: Sync zero-dep core
        run: uv sync --python 3.13t --no-dev
      - name: Assert zero-dependency core
        run: uv run --python 3.13t --no-sync python tests/check_zero_dep_core.py
      - name: Run concurrent_reader tests
        # Override addopts so we do not need pytest-cov in the core-only ephemeral env.
        run: >
          uv run --python 3.13t --no-sync
          --with pytest --with pytest-timeout
          pytest -m concurrent_reader -q --timeout=60 -o addopts=

  # Blocking gate = **structural only** (seek baselines + solid decode-once).
  # Wall-time ratios are noisy on shared runners; they run separately, non-blocking,
  # as a change-guarded scheduled job — see `.github/workflows/benchmark-wall.yml`.
  benchmark:
    name: Benchmark gate (structural)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync (dev + all extras)
        run: uv sync --group dev --extra all
      - name: Structural benchmark gate
        run: >
          uv run --no-sync python -m benchmarks.harness
          --mode structural --json-out benchmark-structural.json
      - name: Upload structural results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-structural
          path: benchmark-structural.json
      - name: Pytest structural gate + measurement unit tests
        run: uv run --no-sync pytest tests/test_benchmark_gate.py tests/test_measurement.py -q
