name: PPMd native stress

# Investigation vehicle for intermittent ``pyppmd`` native aborts on *valid* PPMd
# streams (Windows STATUS_HEAP_CORRUPTION; Linux SIGSEGV / malloc abort after
# other-codec warmup; Linux/Windows exit-after-green abort of
# tests/test_ppmd_raw_streams.py). See docs/internal/known-issues.md.
#
# Runs on every PR and on pushes to main so we keep signal, but lives in its *own*
# workflow on purpose: do **not** add this check as a required status check — a red
# run here must not block merge. The main CI Windows matrix skips the 7z PPMd codec
# param; default pytest excludes ``ppmd_native_stress`` tests. Required CI soft-passes
# the raw-streams exit-after-green abort; this workflow soaks that module hard.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Isolated child iterations per scenario"
        required: false
        default: "20"

concurrency:
  group: ppmd-native-stress-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ppmd-stress:
    name: ${{ matrix.os }} / py${{ matrix.python-version }} / PPMd stress
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows: fresh PPMd-only children reproduce STATUS_HEAP_CORRUPTION.
          - { os: windows-latest, python-version: "3.11" }
          - { os: windows-latest, python-version: "3.14" }
          # Linux: warmup_codecs is highly flaky (~1/3); raw_* stays clean so far.
          - { os: ubuntu-latest, python-version: "3.11" }
          - { os: ubuntu-latest, python-version: "3.14" }
    env:
      UV_PYTHON: ${{ matrix.python-version }}
      ARCHIVEY_PPMD_STRESS_ITERS: ${{ github.event.inputs.iterations || '20' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        id: setup-uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          # Authenticated GitHub API — without this, parallel matrix legs can hit the
          # unauthenticated IP rate limit and leave `uv` missing for later steps.
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync (dev + all extras)
        id: sync
        run: uv sync --python ${{ matrix.python-version }} --group dev --extra all

      - name: Assert synced venv Python matches matrix
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync python -c
          "import sys; exp=tuple(map(int, '${{ matrix.python-version }}'.split('.')));
          got=sys.version_info[:2]; assert got==exp, (got, exp); print(sys.version)"

      - name: Stress PPMd (script — minimal surface + baseline + warmup)
        # Non-zero exit when any child crashes — intentional for visibility.
        # This workflow must stay non-required so a red run does not block merge.
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          python scripts/ppmd_native_stress.py
          --summary ppmd-stress-summary-${{ matrix.os }}-py${{ matrix.python-version }}.md

      - name: Soak test_ppmd_raw_streams (pytest module exit abort)
        # Distinct fingerprint from warmup_codecs: full pytest module goes green
        # (sessionfinish exit=0) then SIGSEGV/SIGABRT on process exit. Required CI
        # soft-passes that abort; this non-required soak keeps the signal visible.
        # Hard-fails the step on any child crash (no --allow-exit-after-green).
        if: steps.sync.outcome == 'success'
        env:
          ARCHIVEY_PPMD_RAW_STREAMS_ITERS: ${{ github.event.inputs.iterations || '20' }}
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          python scripts/ci_run_native_modules.py
          --modules tests/test_ppmd_raw_streams.py
          --repeat ${{ env.ARCHIVEY_PPMD_RAW_STREAMS_ITERS }}
          --summary ppmd-raw-streams-soak-${{ matrix.os }}-py${{ matrix.python-version }}.md

      - name: Stress PPMd (pytest marker entry points)
        # Run even when the script step failed (crash signal), but not when setup/sync
        # never installed `uv` (avoids a misleading "uv: command not found").
        if: steps.sync.outcome == 'success'
        run: >
          uv run --python ${{ matrix.python-version }} --no-sync
          pytest -m ppmd_native_stress -q --timeout=600 -o addopts=

      - name: Upload stress summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ppmd-stress-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            ppmd-stress-summary-${{ matrix.os }}-py${{ matrix.python-version }}.md
            ppmd-raw-streams-soak-${{ matrix.os }}-py${{ matrix.python-version }}.md
          if-no-files-found: ignore
